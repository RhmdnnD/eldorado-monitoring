<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Market Monitor — Eldorado.gg</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8">

    <header class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      <div>
        <h1 class="text-2xl font-bold text-emerald-400 tracking-tight">Roblox Market Monitor</h1>
        <p class="text-gray-500 text-sm">Daily sales intelligence from Eldorado.gg</p>
      </div>
      <div id="last-updated" class="text-xs text-gray-600 bg-gray-900/60 border border-gray-800 rounded-lg px-3 py-1.5 whitespace-nowrap">
        Loading...
      </div>
    </header>

    <div id="stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
      <div class="lg:col-span-1 bg-gray-900/70 backdrop-blur-sm rounded-2xl border border-gray-800 p-5">
        <div class="flex items-center gap-2 mb-4">
          <i data-lucide="pie-chart" class="w-4 h-4 text-emerald-400"></i>
          <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">Sales by Category</h2>
        </div>
        <canvas id="chart-canvas" class="max-h-64"></canvas>
        <div id="chart-empty" class="hidden text-center py-10 text-gray-600 text-sm">No data to chart yet.</div>
      </div>

      <div class="lg:col-span-2 bg-gray-900/70 backdrop-blur-sm rounded-2xl border border-gray-800 overflow-hidden">
        <div class="px-5 py-4 border-b border-gray-800 flex items-center gap-2">
          <i data-lucide="trophy" class="w-4 h-4 text-amber-400"></i>
          <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">Best Sellers</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-gray-800/30 text-gray-500 uppercase text-xs tracking-wider">
                <th class="px-4 py-3 text-left">#</th>
                <th class="px-4 py-3 text-left">Title</th>
                <th class="px-4 py-3 text-left">Category</th>
                <th class="px-4 py-3 text-left">Seller</th>
                <th class="px-4 py-3 text-right">Sold</th>
                <th class="px-4 py-3 text-right">Yesterday</th>
                <th class="px-4 py-3 text-right">Today</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div id="empty" class="hidden text-center py-12 text-gray-600">No data yet. Run the scraper first.</div>
      </div>
    </div>

    <footer class="text-center text-xs text-gray-700">
      Data refreshes daily via GitHub Actions
    </footer>
  </div>

  <script>
    let chartInstance = null;

    async function load() {
      try {
        const res = await fetch('dashboard.json');
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();
        render(data);
      } catch {
        document.getElementById('table-body').innerHTML = '';
        document.getElementById('empty').classList.remove('hidden');
        document.getElementById('chart-empty').classList.remove('hidden');
        document.getElementById('last-updated').textContent = 'Offline — no data';
      }
    }

    function render(data) {
      const items = data.best_sellers || [];
      const top = items.reduce((a, b) => (a.units_sold || 0) >= (b.units_sold || 0) ? a : b, items[0] || null);
      const totalVolume = items.reduce((s, r) => s + (r.units_sold || 0), 0);
      const cats = [...new Set(items.map(r => r.category).filter(Boolean))];

      document.getElementById('stats').innerHTML = [
        {
          icon: 'trophy',
          label: 'Top Performer',
          value: top ? ((top.title || '').length > 28 ? top.title.slice(0, 28) + '...' : top.title) : 'N/A',
          sub: top ? `Sold: ${top.units_sold} units` : '',
        },
        {
          icon: 'trending-up',
          label: 'Total Volume',
          value: totalVolume.toLocaleString(),
          sub: 'units sold today',
        },
        {
          icon: 'layers',
          label: 'Market Reach',
          value: cats.length,
          sub: `category${cats.length !== 1 ? 'ies' : 'y'} with sales`,
        },
        {
          icon: 'shield',
          label: 'Tracking Health',
          value: data.total_records.toLocaleString(),
          sub: 'listings in database',
        },
      ].map(s => `
        <div class="group bg-gray-900/70 backdrop-blur-sm rounded-2xl border border-gray-800 hover:border-gray-700 transition-colors p-5">
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="${s.icon}" class="w-4 h-4 text-emerald-400"></i>
            <span class="text-gray-500 text-xs uppercase tracking-wider font-semibold">${s.label}</span>
          </div>
          <div class="text-base font-bold text-emerald-400 truncate" title="${esc(s.value)}">${esc(s.value)}</div>
          ${s.sub ? `<div class="text-gray-600 text-xs mt-1">${esc(s.sub)}</div>` : ''}
        </div>
      `).join('');
      lucide.createIcons();

      document.getElementById('last-updated').innerHTML =
        `<i data-lucide="clock" class="w-3 h-3 inline mr-1"></i>Updated ${new Date(data.updated_at).toLocaleString()}`;
      lucide.createIcons();

      const tbody = document.getElementById('table-body');
      if (!items.length) {
        tbody.innerHTML = '';
        document.getElementById('empty').classList.remove('hidden');
        document.getElementById('chart-empty').classList.remove('hidden');
        return;
      }
      document.getElementById('empty').classList.add('hidden');
      document.getElementById('chart-empty').classList.add('hidden');

      tbody.innerHTML = items.map((r, i) => `
        <tr class="border-t border-gray-800/60 hover:bg-emerald-950/10 transition-colors">
          <td class="px-4 py-3 text-gray-600 text-xs">${i + 1}</td>
          <td class="px-4 py-3 font-medium text-gray-200 max-w-xs truncate">${esc(r.title || '—')}</td>
          <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-md text-xs font-medium bg-gray-800 text-gray-400">${esc(r.category)}</span></td>
          <td class="px-4 py-3 text-gray-500">${esc(r.seller || '—')}</td>
          <td class="px-4 py-3 text-right text-emerald-400 font-bold">+${r.units_sold}</td>
          <td class="px-4 py-3 text-right text-gray-600">${r.qty_yesterday}</td>
          <td class="px-4 py-3 text-right text-gray-300">${r.qty_today}</td>
        </tr>
      `).join('');

      const catMap = {};
      items.forEach(r => {
        const c = r.category || 'Unknown';
        catMap[c] = (catMap[c] || 0) + (r.units_sold || 0);
      });
      const labels = Object.keys(catMap);
      const values = Object.values(catMap);
      const colors = ['#34d399', '#60a5fa', '#f472b6', '#fbbf24', '#a78bfa'];

      if (chartInstance) chartInstance.destroy();
      const ctx = document.getElementById('chart-canvas').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors.slice(0, labels.length),
            borderWidth: 0,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#9ca3af', padding: 12, usePointStyle: true, pointStyle: 'circle' },
            },
          },
        },
      });
    }

    function esc(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    load();
  </script>
</body>
</html>
